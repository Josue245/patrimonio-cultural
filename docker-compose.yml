services:

  # ── PostgreSQL 15 + PostGIS ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: patrimonio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       patrimonio_junin
      POSTGRES_USER:     patrimonio_user
      POSTGRES_PASSWORD: patrimonio_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - patrimonio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrimonio_user -d patrimonio_junin"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Laravel PHP-FPM 8.3 ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patrimonio_backend
    restart: unless-stopped
    working_dir: /var/www
    # Share code with nginx — vendor is built inside image, not mounted from host
    volumes:
      - ./backend:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
    environment:
      APP_NAME:          "Patrimonio Cultural Andino"
      APP_ENV:           local
      APP_DEBUG:         "true"
      APP_URL:           "http://localhost:8000"
      DB_CONNECTION:     pgsql
      DB_HOST:           postgres
      DB_PORT:           "5432"
      DB_DATABASE:       patrimonio_junin
      DB_USERNAME:       patrimonio_user
      DB_PASSWORD:       patrimonio_pass
      SESSION_DRIVER:    file
      CACHE_DRIVER:      file
      QUEUE_CONNECTION:  sync
      JWT_TTL:           "1440"
      FILESYSTEM_DISK:   local
      MAIL_MAILER:       log
      FRONTEND_URL:      "http://localhost:5173"
      DJANGO_ML_URL:     "http://django-ml:8001"
      ML_INTERNAL_TOKEN: "patrimonio-ml-internal-2024"
      L5_SWAGGER_GENERATE_ALWAYS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - patrimonio_net

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: patrimonio_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
      - vendor_data:/var/www/vendor:ro
      - storage_data:/var/www/storage:ro
    depends_on:
      - backend
    networks:
      - patrimonio_net

  # ── Django ML Service (Groq + scikit-learn) ──────────────────────────────
  django-ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: patrimonio_django_ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DJANGO_SECRET_KEY: "django-ml-secret-change-in-prod"
      DEBUG:             "True"
      DB_HOST:           postgres
      DB_PORT:           "5432"
      DB_DATABASE:       patrimonio_junin
      DB_USERNAME:       patrimonio_user
      DB_PASSWORD:       patrimonio_pass
      GROQ_API_KEY:      "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"
      GROQ_MODEL:        "llama-3.3-70b-versatile"     
      ML_INTERNAL_TOKEN: "patrimonio-ml-internal-2024"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - patrimonio_net

  # ── React + Vite (Node 20) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patrimonio_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
    networks:
      - patrimonio_net

volumes:
  postgres_data:
  vendor_data:
  storage_data:

networks:
  patrimonio_net:
    driver: bridge
